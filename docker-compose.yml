services:
  postgres:
    image: postgres:16
    container_name: toolboard-postgres
    restart: unless-stopped
    environment:
    
      POSTGRES_USER: toolboard
      POSTGRES_PASSWORD: toolboard
      POSTGRES_DB: toolboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: