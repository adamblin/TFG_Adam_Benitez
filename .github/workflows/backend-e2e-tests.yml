name: Backend E2E Tests

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e-tests.yml"

permissions:
  contents: read

jobs:
  e2e-tests:
    name: Run Backend E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: toolboard
          POSTGRES_PASSWORD: toolboard
          POSTGRES_DB: toolboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toolboard -d toolboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://toolboard:toolboard@localhost:5432/toolboard?schema=public
      NODE_ENV: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.0

      - name: Use Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run endpoint tests
        run: npm run test:e2e -- --runInBand
